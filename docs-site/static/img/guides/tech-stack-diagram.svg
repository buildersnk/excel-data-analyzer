<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 520" role="img" aria-label="Tech stack architecture diagram">
  <rect width="1120" height="520" fill="#f7f7fc"/>

  <rect x="60" y="60" width="1000" height="400" rx="18" fill="#ffffff" stroke="#d5daf0"/>
  <text x="90" y="98" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="24" fill="#2d3454">Excel Data Model Studio Architecture</text>

  <rect x="100" y="130" width="220" height="120" rx="12" fill="#e9f3ff" stroke="#aed0f0"/>
  <text x="210" y="176" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">Upload Layer</text>
  <text x="210" y="202" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">xlsx parser</text>

  <rect x="360" y="130" width="220" height="120" rx="12" fill="#eef0ff" stroke="#bfc4ef"/>
  <text x="470" y="176" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">Model Canvas</text>
  <text x="470" y="202" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">React Flow</text>

  <rect x="620" y="130" width="220" height="120" rx="12" fill="#f4ecff" stroke="#cdbcf1"/>
  <text x="730" y="176" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">SQL Engine</text>
  <text x="730" y="202" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">SQLite WASM (sql.js)</text>

  <rect x="880" y="130" width="140" height="120" rx="12" fill="#fff0f6" stroke="#efbfd8"/>
  <text x="950" y="176" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">Charts</text>
  <text x="950" y="202" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">Recharts</text>

  <rect x="220" y="300" width="300" height="120" rx="12" fill="#f0f5ff" stroke="#b8c9ef"/>
  <text x="370" y="344" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">App Core</text>
  <text x="370" y="370" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">React + TypeScript + Vite</text>

  <rect x="600" y="300" width="300" height="120" rx="12" fill="#f8efff" stroke="#d0c1f0"/>
  <text x="750" y="344" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" fill="#3d4f74">Persistence</text>
  <text x="750" y="370" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#59688f">localStorage (history, presets)</text>

  <g stroke="#8f9ad2" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M320 190h30"/>
    <path d="M580 190h30"/>
    <path d="M840 190h30"/>
    <path d="M470 250v40"/>
    <path d="M730 250v40"/>
  </g>
  <g fill="#8f9ad2">
    <path d="M350 190l-10-7v14z"/>
    <path d="M610 190l-10-7v14z"/>
    <path d="M870 190l-10-7v14z"/>
    <path d="M470 290l-7-10h14z"/>
    <path d="M730 290l-7-10h14z"/>
  </g>
